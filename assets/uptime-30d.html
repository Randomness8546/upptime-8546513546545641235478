<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <meta name="theme-color" content="#333333" />
  <title>Uptime — laatste 30 dagen</title>

  <!-- Reuse Upptime’s stable theme + global CSS -->
  <link rel="stylesheet" href="themes/light.css" media="(preferss"  media="(prefers-color-scheme, no hashed classes) ===== */
    :root {
      /* fallbacks if variables aren’t present */
      --container-max: 1100px;
      --surface: var(--card-background-color, #ffffff);
      --text: var(--body-text-color, #111827);
      --muted: #6b7280;
      --border: var(--nav-border-bottom-color, #e5e7eb);
      --bg: var(--body-background-color, #ffffff);
      --ok: var(--ok, #16a34a);
      --warn: var(--warn, #f59e0b);
      --down: var(--down, #ef4444);
    }
    body { background: var(--bg); color: var(--text); margin: 0; }
    .nav {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .container {
      max-width: var(--container-max);
      margin: 0 auto;
      padding: 12px 16px;
    }
    .brand {
      display: flex; gap: 10px; align-items: center; text-decoration: none; color: inherit;
      font-weight: 600;
    }
    .brand img { height: 28px; width: 28px; }
    .main { padding: 16px 0 24px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,.03);
    }
    h1 { font-size: 22px; margin: 0 0 10px; }
    p.sub { margin: 4px 0 16px; color: var(--muted); }

    /* ===== Table styling close to Upptime ===== */
    table.status-table { width: 100%; border-collapse: collapse; }
    table.status-table th, table.status-table td {
      padding: 8px 10px; border-bottom: 1px solid var(--border);
    }
    table.status-table th { text-align: left; font-weight: 600; font-size: 14px; }
    table.status-table td { font-size: 14px; }

    .pill { display:inline-block; padding:2px 8px; border-radius:12px; font-size:12px; }
    .pill.up   { background: #d1e7dd; color:#0f5132; }
    .pill.down { background: #f8d7da; color:#842029; }
    .uptime { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }

    /* ===== 30‑day bar strip ===== */
    .u-bars { display:grid; grid-auto-flow:column; grid-auto-columns: 10px; gap:3px; margin-top:4px; }
    .u-bars .cell { width:10px; height:18px; border-radius:2px; border:1px solid transparent; }
    .u-bars .lvl0 { background: color-mix(in oklab, var(--ok) 22%, transparent); border-color: color-mix(in oklab, var(--ok) 40%, transparent); }
    .u-bars .lvl1 { background: color-mix(in oklab, var(--warn) 30%, transparent); border-color: color-mix(in oklab, var(--warn) 50%, transparent); }
    .u-bars .lvl2 { background: color-mix(in oklab, #f97316 40%, transparent); border-color: color-mix(in oklab, #f97316 60%, transparent); }
    .u-bars .lvl3 { background: color-mix(in oklab, var(--down) 45%, transparent); border-color: color-mix(in oklab, var(--down) 65%, transparent); }

    footer { border-top: 1px solid var(--border); margin-top: 24px; }
    footer p { color: var(--muted); font-size: 13px; }
    footer a { color: inherit; }
  </style>
</head>
