<!doctype html>
<html lang="en">
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>90‑day Uptime | Upptime</title>

<div id="uptime-90d"
     data-owner="Randomness8546"
     data-repo="upptime-8546513546545641235478"
     data-branch="master"      <!-- change to 'main' if your default branch is main -->
     data-include="*"
     style="max-width: 1100px; margin: 24px auto;"></div>

<script type="module">
/**
 * Upptime 90-day Uptime Widget
 * Reads history/summary.json → uses dailyMinutesDown[YYYY-MM-DD] to paint a day green (0) or red (>0).
 * summary.json and dailyMinutesDown are generated by Upptime's summary workflow. 
 * See docs about Upptime data & site generation. 
 */
const el = document.getElementById('uptime-90d');
const GH_OWNER  = el.dataset.owner;
const GH_REPO   = el.dataset.repo;
const GH_BRANCH = el.dataset.branch || 'master';
const INCLUDE   = (el.dataset.include || '*').split(',').map(s => s.trim().toLowerCase()).filter(Boolean);

const RAW = (path) => `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${path}`;

const styles = `
.u90 { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial, "Noto Sans", sans-serif; color:#111; padding: 8px 16px; }
.u90 h1 { font-size: 20px; margin: 0 0 12px 0; }
.u90 .legend { display:flex; gap:10px; align-items:center; margin:12px 0 16px; font-size:12px; color:#444; }
.u90 .dot { width:10px; height:10px; border-radius:2px; display:inline-block; }
.u90 .dot.up { background:#19875433; border:1px solid #19875480; }
.u90 .dot.down { background:#dc354533; border:1px solid #dc354580; }
.u90 .row { display:grid; grid-template-columns: 240px auto 74px; align-items:center; gap:12px; margin-bottom:10px; }
.u90 .name { font-weight:600; white-space:nowrap; overflow: hidden; text-overflow: ellipsis; }
.u90 .strip { display:grid; grid-auto-flow:column; grid-auto-columns: 9px; gap:2px; }
.u90 .cell { width:9px; height:18px; border-radius:2px; background:#d1e7dd; }  /* up (green-ish) */
.u90 .down { background:#f8d7da; } /* down (red-ish) */
.u90 .uptime { font-variant-numeric: tabular-nums; text-align:right; color:#333; }
@media (prefers-color-scheme: dark) {
  .u90 { color:#e9eef5; }
  .u90 .cell { background:#1f3a2e; }
  .u90 .down { background:#3f2326; }
  .u90 .uptime { color:#cfd7df; }
}
`;
const style = document.createElement('style');
style.textContent = styles;
document.head.appendChild(style);

const root = document.createElement('div'); root.className = 'u90';

const hdr = document.createElement('div');
hdr.innerHTML = `<h1>90‑day uptime</h1>
<div class="legend">
  <span>Last 90 days per service</span>
  <span class="dot up"></span> <span>Up</span>
  <span class="dot down"></span> <span>Had downtime</span>
</div>`;
root.appendChild(hdr);

const body = document.createElement('div'); root.appendChild(body);

const today = new Date(); today.setHours(0,0,0,0);
const toIso = d => d.toISOString().slice(0,10);
const days = [...Array(90)].map((_,i) => { const d = new Date(today); d.setDate(d.getDate() - (89 - i)); return toIso(d); });

async function load() {
  const url = RAW('history/summary.json');
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`Fetch failed: ${res.status} ${url}`);
  /** Expected record fields (subset):
   *  name, slug, uptime, uptimeMonth, dailyMinutesDown: { 'YYYY-MM-DD': minutes }
   *  dailyMinutesDown is part of Upptime's summary data. 
   */
  const data = await res.json();

  const services = data.filter(s => {
    if (INCLUDE.length === 0 || INCLUDE[0] === '*') return true;
    return INCLUDE.includes(String(s.slug || '').toLowerCase());
  });

  services.forEach(svc => {
    const row = document.createElement('div'); row.className = 'row';

    const name = document.createElement('div'); name.className = 'name';
    name.textContent = svc.name || svc.slug || '(unnamed)';

    const strip = document.createElement('div'); strip.className = 'strip';
    days.forEach(day => {
      const minutes = (svc.dailyMinutesDown && svc.dailyMinutesDown[day]) || 0;
      const cell = document.createElement('div');
      cell.className = 'cell' + (minutes > 0 ? ' down' : '');
      cell.title = `${name.textContent}\n${day} – ${minutes > 0 ? minutes + ' min down' : 'up'}`;
      strip.appendChild(cell);
    });

    const uptime = document.createElement('div'); uptime.className = 'uptime';
    const u = typeof svc.uptimeMonth === 'number' ? svc.uptimeMonth
            : typeof svc.uptime === 'number' ? svc.uptime : null;
    uptime.textContent = (u !== null) ? `${u.toFixed(2)}%` : '';

    row.appendChild(name); row.appendChild(strip); row.appendChild(uptime);
    body.appendChild(row);
  });
}

load().catch(e => {
  const pre = document.createElement('pre');
  pre.style.color = 'crimson';
  pre.textContent = `Uptime 90d widget error:\n${e}\n\nCheck that your repo/branch is public and that history/summary.json exists.`;
  body.appendChild(pre);
});

document.getElementById('uptime-90d').replaceWith(root);
</script>
</html>
