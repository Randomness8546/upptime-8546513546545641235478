name: Patch GH Pages (inject 30‑day bars)

on:
  push:
    branches: [ gh-pages ]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          persist-credentials: true

      - name: Determine default branch
        id: def
        run: |
          curl -sSL "https://api.github.com/repos/${{ github.repository }}" \
            | jq -r '.default_branch' > .defbranch
          echo "branch=$(cat .defbranch)" >> $GITHUB_OUTPUT

      - name: Copy bars-30d.js from default branch path
        run: |
          BRANCH="${{ steps.def.outputs.branch }}"
          curl -fsSL \
            "https://raw.githubusercontent.com/${{ github.repository }}/${BRANCH}/.github/scripts/bars-30d.js" \
            -o bars-30d.js

      - name: Inject <script> into index.html
        shell: node
        run: |
          const fs = require('fs');
          const p = 'index.html';
          if (!fs.existsSync(p)) { throw new Error('index.html not found on gh-pages'); }
          let html = fs.readFileSync(p, 'utf8');
          if (!html.includes('bars-30d.js')) {
            html = html.replace(/<\/body>\s*<\/html>\s*$/i,
              '  ./bars-30d.js</script>\n</body></html>');
            fs.writeFileSync(p, html);
            console.log('Injected bars-30d.js into index.html');
          } else {
            console.log('bars-30d.js already referenced; skipping');
          }

      - name: Commit & push changes
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add index.html bars-30d.js
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "feat(status): inject 30‑day granular bars into homepage"
            git push origin gh-pages
          fi
